site_name: AI Engineering Roadmap
site_description: A public, hands-on roadmap for becoming an AI Engineer — from foundations to production LLMOps, agents, and fine-tuning.
site_author: Md Golam Rasul

theme:
  name: material
  language: en
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs          # top-level sections as tabs
    - navigation.sections      # render sections as groups in the sidebar
    - navigation.indexes       # section landing (index) pages
    - navigation.top           # back-to-top button
    - navigation.tracking      # update URL with the active anchor
    - navigation.footer        # previous/next links in the footer
    - toc.follow               # sidebar TOC follows scroll
    - search.suggest           # autocomplete search
    - search.highlight         # highlight search matches
    - content.code.copy        # copy button on code blocks
    - content.code.annotate    # code annotations
    - content.tabs.link

plugins:
  - search
  - tags                       # tag articles by concept (RAG, agents, LLMOps, ...)

markdown_extensions:
  # Syntax highlighting
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  # Nice-to-haves for writing articles
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Start Here: start-here/index.md
  - Roadmap:
      - Stage 0 – Foundations: stage-0-foundations/index.md
      - Stage 1 – RAG: stage-1-rag/index.md
      - Stage 2 – Agentic AI: stage-2-agentic-ai/index.md
      - Stage 3 – Evaluation: stage-3-evaluation/index.md
      - Stage 4 – LLMOps & Production: stage-4-llmops/index.md
      - Stage 5 – Fine-tuning: stage-5-fine-tuning/index.md
      - Stage 6 – Expert: stage-6-expert/index.md
  - About: about/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/
      name: GitHub
